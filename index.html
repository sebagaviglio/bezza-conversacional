<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bezza — conversá y listo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
<style>
  @property --angle{
    syntax:'<angle>';
    inherits:false;
    initial-value:0deg;
  }

  :root{
    --rojo:#F30027;
    --purpura:#C315AB;
    --gradiente: linear-gradient(120deg, var(--rojo) 0%, var(--purpura) 100%);
    --verde-bancor:#005F5A;
    --verde-brillante:#CAF14D;
    --verde-claro:#D4F8D9;
    --negro:#0A0A0B;
    --superficie:#panel;
    --panel:#161618;
    --panel-2:#1D1D20;
    --texto-alto:#F7F7F5;
    --texto-bajo:#8B8B8F;
    --font-txt-scale: 1;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#050505;
    font-family:"Mona Sans", system-ui, sans-serif;
  }

  /* ---------- iPhone frame ---------- */
  .phone{
    position:relative;
    width:390px;
    height:844px;
    max-height:100vh;
    background:#000;
    border-radius:0;
    padding:0;
  }
  .screen{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--negro);
    display:flex;
    flex-direction:column;
  }
  .island{
    position:absolute;
    top:12px; left:50%; transform:translateX(-50%);
    width:120px; height:34px;
    background:#000;
    border-radius:20px;
    z-index:50;
  }
  .statusbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 26px 2px;
    font-size:14px;
    font-weight:600;
    color:var(--texto-alto);
    flex-shrink:0;
  }
  .statusbar .icons{display:flex; gap:5px; align-items:center; font-size:12px;}
  .home-indicator{
    position:absolute;
    bottom:8px; left:50%; transform:translateX(-50%);
    width:134px; height:5px;
    border-radius:4px;
    background:rgba(255,255,255,0.5);
    z-index:50;
  }

  /* ---------- Header compacto: marca + saldo persistente ---------- */
  .app-header{
    flex-shrink:0;
    padding:8px 16px 10px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:34px; height:34px;
    border-radius:11px;
    background:var(--gradiente);
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    font-weight:800;
    font-size:15px;
    flex-shrink:0;
  }
  .saldo-pill{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel);
    border-radius:16px;
    padding:8px 14px;
    cursor:pointer;
  }
  .saldo-pill:active{transform:scale(0.99);}
  .saldo-pill .lado{display:flex; flex-direction:column; line-height:1.2;}
  .saldo-pill .etiqueta{font-size:10.5px; color:var(--texto-bajo); font-weight:600; letter-spacing:.02em; text-transform:uppercase;}
  .saldo-pill .monto{font-size:17px; font-weight:800; color:var(--texto-alto);}
  .saldo-pill .rinde{font-size:11px; color:var(--verde-brillante); font-weight:700; display:flex; align-items:center; gap:4px;}

  .icon-btn{
    width:34px; height:34px;
    border-radius:50%;
    background:var(--panel);
    border:none;
    display:flex; align-items:center; justify-content:center;
    color:var(--texto-alto);
    cursor:pointer;
    flex-shrink:0;
    font-size:15px;
  }
  .icon-btn:active{transform:scale(0.92);}

  /* ---------- Chat ---------- */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:2px 16px 8px;
    display:flex;
    flex-direction:column;
    gap:9px;
    scrollbar-width:none;
  }
  .chat::-webkit-scrollbar{display:none;}

  .msg{
    max-width:80%;
    display:flex;
    flex-direction:column;
    gap:4px;
    animation:aparecer .28s ease both;
  }
  @keyframes aparecer{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  .msg.bezza{align-self:flex-start;}
  .msg.user{align-self:flex-end;}

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    font-size:calc(14.5px * var(--font-txt-scale));
    line-height:1.4;
    font-weight:400;
  }
  .msg.bezza .bubble{
    background:var(--panel);
    color:var(--texto-alto);
    border-bottom-left-radius:5px;
  }
  .msg.bezza .bubble strong{font-weight:700;}
  .msg.user .bubble{
    background:var(--verde-brillante);
    color:#122006;
    font-weight:600;
    border-bottom-right-radius:5px;
  }

  /* Tarjeta compacta de confirmación */
  .confirm-card{
    background:var(--verde-claro);
    border-radius:16px;
    padding:11px 14px;
    color:#0E1D10;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .confirm-card .check{
    width:26px; height:26px;
    border-radius:50%;
    background:var(--verde-bancor);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    font-size:13px;
  }
  .confirm-card .txt b{display:block; font-size:calc(13.5px * var(--font-txt-scale));}
  .confirm-card .txt span{font-size:calc(11.5px * var(--font-txt-scale)); opacity:.7;}

  /* Chips: una sola fila, se puede scrollear horizontal, no vertical */
  .chips{
    display:flex;
    gap:7px;
    overflow-x:auto;
    scrollbar-width:none;
    padding:1px 1px 3px;
    max-width:100%;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    padding:9px 14px;
    border-radius:999px;
    background:var(--panel);
    border:none;
    color:var(--texto-alto);
    font-size:calc(13px * var(--font-txt-scale));
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
  }
  .chip:active{transform:scale(0.95);}
  .chip.destacado{
    background:var(--gradiente);
    color:#fff;
  }
  .chip.humano{
    background:var(--verde-bancor);
    color:#fff;
  }

  .typing{
    display:flex; gap:4px; align-items:center;
    padding:11px 14px;
    background:var(--panel);
    border-radius:16px;
    border-bottom-left-radius:5px;
    width:fit-content;
  }
  .typing span{
    width:5px;height:5px;border-radius:50%;
    background:var(--texto-bajo);
    animation:parpadeo 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes parpadeo{0%,60%,100%{opacity:.25; transform:translateY(0);} 30%{opacity:1; transform:translateY(-2px);}}

  /* ---------- Barra inferior ---------- */
  .a11y-bar{
    flex-shrink:0;
    display:flex;
    gap:6px;
    padding:0 16px 6px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .a11y-bar::-webkit-scrollbar{display:none;}
  .a11y-btn{
    flex-shrink:0;
    padding:5px 11px;
    border-radius:999px;
    background:transparent;
    border:1px solid #2A2A2D;
    color:var(--texto-bajo);
    font-size:11px;
    font-weight:600;
    display:flex; align-items:center; gap:4px;
    cursor:pointer;
  }
  .a11y-btn.on{
    background:rgba(202,241,77,0.12);
    border-color:var(--verde-brillante);
    color:var(--verde-brillante);
  }

  .input-bar{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:9px;
    padding:6px 14px calc(env(safe-area-inset-bottom, 0px) + 14px);
  }

  /* Anillo animado tipo Siri alrededor del campo de texto */
  .text-field-ring{
    flex:1;
    position:relative;
    border-radius:24px;
    padding:2px;
  }
  .text-field-ring::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:24px;
    background:conic-gradient(from var(--angle), var(--rojo), var(--purpura), var(--verde-brillante), var(--rojo));
    animation:girar 5s linear infinite;
    opacity:.5;
  }
  .text-field-ring.activo::before{
    animation-duration:1.4s;
    opacity:1;
  }
  @keyframes girar{ to{ --angle:360deg; } }

  .text-field{
    position:relative;
    display:flex;
    align-items:center;
    background:var(--negro);
    border-radius:22px;
    margin:1px;
    z-index:1;
  }
  .text-field input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:var(--texto-alto);
    font-family:inherit;
    font-size:calc(14.5px * var(--font-txt-scale));
    padding:11px 6px 11px 16px;
  }
  .text-field input::placeholder{color:var(--texto-bajo);}

  .send-btn{
    width:36px; height:36px;
    border-radius:50%;
    background:var(--verde-brillante);
    border:none;
    display:flex; align-items:center; justify-content:center;
    color:#0E1D10;
    cursor:pointer;
    flex-shrink:0;
    margin-right:4px;
  }
  .send-btn:active{transform:scale(0.92);}

  .mic-btn{
    width:44px; height:44px;
    border-radius:50%;
    border:none;
    background:var(--gradiente);
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    flex-shrink:0;
    cursor:pointer;
    position:relative;
  }
  .mic-btn::after{
    content:'';
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:2px solid var(--verde-brillante);
    opacity:0;
  }
  .mic-btn.activo::after{
    animation:onda 1.1s ease-out infinite;
  }
  @keyframes onda{
    0%{opacity:.8; transform:scale(0.8);}
    100%{opacity:0; transform:scale(1.5);}
  }

  @media (max-width:460px){
    .phone{width:100%; height:100dvh; max-height:100dvh;}
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen" id="screen">
    <div class="island"></div>

    <div class="statusbar">
      <span id="clock">21:04</span>
      <div class="icons">
        <span>●●●</span>
        <span>📶</span>
        <span>🔋</span>
      </div>
    </div>

    <div class="app-header">
      <div class="brand-mark">B</div>
      <div class="saldo-pill" id="saldoPill">
        <div class="lado">
          <span class="etiqueta">Saldo disponible</span>
          <span class="monto">$ 84.350</span>
        </div>
        <span class="rinde">▲ rinde</span>
      </div>
      <button class="icon-btn" id="btnConfig" title="Ajustes">⚙️</button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="a11y-bar">
      <div class="a11y-btn" id="btn-textogrande">🔤 Texto grande</div>
      <div class="a11y-btn" id="btn-leer">🔊 Leer en voz alta</div>
    </div>

    <div class="input-bar">
      <button class="mic-btn" id="btnMic" title="Hablar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </button>
      <div class="text-field-ring" id="ring">
        <div class="text-field">
          <input id="inputTexto" type="text" placeholder="Contame qué necesitás…" />
          <button class="send-btn" id="btnEnviar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const inputTexto = document.getElementById('inputTexto');
const btnEnviar = document.getElementById('btnEnviar');
const btnMic = document.getElementById('btnMic');
const ring = document.getElementById('ring');
const saldoPill = document.getElementById('saldoPill');

function scrollAbajo(){ chat.scrollTop = chat.scrollHeight; }

function crearMsg({from, html}){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + from;
  const b = document.createElement('div');
  b.innerHTML = html;
  wrap.appendChild(b);
  chat.appendChild(wrap);
  scrollAbajo();
  return wrap;
}

function bubbleTexto(from, texto){
  crearMsg({from, html:`<div class="bubble">${texto}</div>`});
}

function bubbleChips(chips){
  const html = `<div class="chips">${chips.map(c=>`<div class="chip ${c.destacado?'destacado':''} ${c.humano?'humano':''}" data-accion="${c.accion}">${c.icono||''} ${c.texto}</div>`).join('')}</div>`;
  const el = crearMsg({from:'bezza', html});
  el.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=> manejarAccion(chip.dataset.accion, chip.textContent.trim()));
  });
}

function bubbleConfirmacion(titulo, detalle){
  crearMsg({from:'bezza', html:`
    <div class="confirm-card">
      <div class="check">✓</div>
      <div class="txt"><b>${titulo}</b><span>${detalle}</span></div>
    </div>`});
}

function mostrarEscribiendo(cb, delay=650){
  const el = crearMsg({from:'bezza', html:`<div class="typing"><span></span><span></span><span></span></div>`});
  setTimeout(()=>{
    el.remove();
    cb();
  }, delay);
}

function menuCorto(){
  bubbleChips([
    {texto:'Transferir', icono:'💸', accion:'transferir', destacado:true},
    {texto:'Pagar con QR', icono:'📷', accion:'pagar'},
    {texto:'Beneficios', icono:'🎁', accion:'beneficios'},
    {texto:'Hablar con alguien', icono:'🙋', accion:'humano', humano:true},
  ]);
}

function manejarAccion(accion, textoUsuario){
  if(textoUsuario) bubbleTexto('user', textoUsuario);
  if(accion==='transferir'){
    mostrarEscribiendo(()=>{
      bubbleTexto('bezza','Decime a quién y cuánto. Por ejemplo: <strong>"$5.000 a mi mamá"</strong>.');
      bubbleChips([
        {texto:'$5.000 a Mamá', accion:'confirmar-transf'},
        {texto:'$2.000 a Juan', accion:'confirmar-transf'},
      ]);
    });
  } else if(accion==='confirmar-transf'){
    mostrarEscribiendo(()=>{
      bubbleTexto('bezza','¿Confirmamos el envío?');
      bubbleChips([
        {texto:'Sí, confirmar', accion:'exito-transf', destacado:true},
        {texto:'Cambiar monto', accion:'transferir'},
      ]);
    }, 500);
  } else if(accion==='exito-transf'){
    mostrarEscribiendo(()=>{
      bubbleConfirmacion('¡Transferencia exitosa!','Re fácil, re rápido.');
      menuCorto();
    }, 700);
  } else if(accion==='pagar'){
    mostrarEscribiendo(()=>{
      bubbleTexto('bezza','Apuntá la cámara al QR del comercio.');
      bubbleChips([
        {texto:'Abrir cámara', icono:'📷', accion:'abrir-camara', destacado:true},
      ]);
    });
  } else if(accion==='abrir-camara'){
    mostrarEscribiendo(()=>{
      bubbleConfirmacion('Pago realizado','$3.200 en Café de la Cañada.');
      menuCorto();
    }, 800);
  } else if(accion==='beneficios'){
    mostrarEscribiendo(()=>{
      bubbleTexto('bezza','Beneficios activos esta semana:');
      bubbleChips([
        {texto:'20% Farmacias', icono:'💊', accion:'menu'},
        {texto:'2x1 Cines', icono:'🎬', accion:'menu'},
        {texto:'15% Supermercados', icono:'🛒', accion:'menu'},
      ]);
    });
  } else if(accion==='humano'){
    mostrarEscribiendo(()=>{
      bubbleTexto('bezza','Listo, te conecto por WhatsApp con nuestro equipo ahora mismo.');
    });
  } else {
    mostrarEscribiendo(()=> menuCorto());
  }
}

function iniciar(){
  bubbleTexto('bezza','¡Hola! Soy Bezza. Conversemos: contame qué necesitás y lo resolvemos.');
  menuCorto();
}

function enviarLibre(){
  const texto = inputTexto.value.trim();
  if(!texto) return;
  bubbleTexto('user', texto);
  inputTexto.value='';
  const t = texto.toLowerCase();
  mostrarEscribiendo(()=>{
    if(t.includes('saldo')||t.includes('plata')||t.includes('cuanto tengo')){
      bubbleTexto('bezza','Arriba de todo siempre vas a ver tu saldo actualizado: <strong>$84.350</strong>.');
    } else if(t.includes('transfer')||t.includes('enviar')||t.includes('mandar')){
      manejarAccion('transferir', null);
      return;
    } else if(t.includes('pagar')||t.includes('qr')){
      manejarAccion('pagar', null);
      return;
    } else if(t.includes('benefic')||t.includes('descuento')||t.includes('promo')){
      manejarAccion('beneficios', null);
      return;
    } else if(t.includes('persona')||t.includes('humano')||t.includes('ayuda')){
      manejarAccion('humano', null);
      return;
    } else {
      bubbleTexto('bezza','Contame con tus palabras qué necesitás, o elegí una opción:');
    }
    menuCorto();
  }, 600);
}

btnEnviar.addEventListener('click', enviarLibre);
inputTexto.addEventListener('keydown', e=>{ if(e.key==='Enter') enviarLibre(); });
inputTexto.addEventListener('focus', ()=> ring.classList.add('activo'));
inputTexto.addEventListener('blur', ()=> ring.classList.remove('activo'));

saldoPill.addEventListener('click', ()=>{
  bubbleTexto('bezza','Tu saldo de <strong>$84.350</strong> está generando interés todos los días, sin que hagas nada.');
});

let escuchando = false;
btnMic.addEventListener('click', ()=>{
  escuchando = !escuchando;
  btnMic.classList.toggle('activo', escuchando);
  ring.classList.toggle('activo', escuchando);
  if(escuchando){
    inputTexto.placeholder = 'Te escucho…';
    setTimeout(()=>{
      if(escuchando){
        escuchando=false;
        btnMic.classList.remove('activo');
        ring.classList.remove('activo');
        inputTexto.placeholder='Contame qué necesitás…';
        inputTexto.value='Quiero transferirle plata a mi hijo';
        enviarLibre();
      }
    }, 1600);
  }
});

const btnTextoGrande = document.getElementById('btn-textogrande');
const btnLeer = document.getElementById('btn-leer');
btnTextoGrande.addEventListener('click', ()=>{
  const activo = btnTextoGrande.classList.toggle('on');
  document.getElementById('screen').style.setProperty('--font-txt-scale', activo ? '1.2' : '1');
});
btnLeer.addEventListener('click', ()=>{
  btnLeer.classList.toggle('on');
});

function actualizarReloj(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',hour12:false});
}
actualizarReloj();
setInterval(actualizarReloj, 30000);

iniciar();
</script>

</body>
</html>
